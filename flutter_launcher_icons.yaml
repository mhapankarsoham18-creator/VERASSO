flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon.jpeg"
  min_sdk_android: 21
  remove_alpha_ios: true
  # Android Adaptive Icon
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "app_icon.jpeg"
  # Web favicon
  web:
    generate: true
    image_path: "app_icon.jpeg"
  # Windows
  windows:
    generate: true
    image_path: "app_icon.jpeg"

name: VERASSO CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests (only for hotfix)"
        required: false
        default: "false"

env:
  FLUTTER_VERSION: "3.41.0"
  COVERAGE_THRESHOLD: 50

jobs:
  # ════════════════════════════════════════════════════════
  # STAGE 1: CODE QUALITY & ANALYSIS
  # ════════════════════════════════════════════════════════
  analyze:
    runs-on: ubuntu-latest
    name: 📊 Code Analysis & Formatting
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🎨 Check code formatting
        run: |
          if [ -d "test" ]; then
            dart format --set-exit-if-changed lib test
          else
            dart format --set-exit-if-changed lib
          fi

      - name: 🔍 Run flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

  # ════════════════════════════════════════════════════════
  # STAGE 2: SECURITY SCANNING
  # ════════════════════════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    name: 🔒 Security & Credential Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Check for hardcoded credentials
        run: |
          echo "🔍 Scanning for exposed credentials..."

          # Check for hardcoded API keys (exclude String.fromEnvironment and comments)
          if grep -rn "SUPABASE_KEY\|SECRET_KEY\|firebase_key\|auth_token" lib/ --include="*.dart" --exclude-dir=.git | grep -v "fromEnvironment" | grep -v "//"; then
            echo "❌ Found potential hardcoded credentials in source code"
            exit 1
          fi

          echo "✅ No hardcoded credentials detected"

      - name: 🔓 Check for dangerous patterns
        run: |
          echo "🔍 Scanning for dangerous code patterns..."

          # Check for dangerous functions (exclude sandbox blocklists)
          if grep -r "eval(\|exec(\|system(" lib/ --include="*.dart" --exclude-dir=sandbox; then
            echo "❌ Found dangerous function calls"
            exit 1
          fi

          echo "✅ No dangerous patterns detected"

  # ════════════════════════════════════════════════════════
  # STAGE 3: UNIT & INTEGRATION TESTS
  # ════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    name: 🧪 Unit & Integration Tests
    needs: analyze
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧪 Run all tests with coverage
        run: |
          if [ -d "test" ]; then
            flutter test --coverage
          else
            echo "⚠️ No test directory found, skipping tests."
            mkdir -p coverage
            touch coverage/lcov.info
          fi
        continue-on-error: true

      - name: 📊 Check coverage threshold
        run: |
          if [ -f "coverage/lcov.info" ]; then
            sudo apt-get update && sudo apt-get install -y lcov
            COVERAGE_FLOAT=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+' || echo "0.0")
            COVERAGE=${COVERAGE_FLOAT%.*}
            echo "📈 Code Coverage: $COVERAGE_FLOAT%"

            if [ "$COVERAGE" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
              echo "::warning::Coverage ($COVERAGE_FLOAT%) below threshold (${{ env.COVERAGE_THRESHOLD }}%)"
            fi
          fi

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: flutter
          name: codecov-umbrella
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════
  # STAGE 3.5: SUPABASE INTEGRATION TESTS
  # ════════════════════════════════════════════════════════
  test_integration_supabase:
    runs-on: ubuntu-latest
    name: 🧪 Supabase Integration Tests
    needs: analyze
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🛠️ Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🚀 Start Supabase Local
        run: supabase start
        continue-on-error: true

      - name: 🧪 Run Integration Tests
        run: |
          if [ -d "integration_test" ]; then
            # Get credentials from local supabase
            URL=$(supabase status -o json | jq -r '.API_URL' || echo "http://localhost:54321")
            ANON=$(supabase status -o json | jq -r '.ANON_KEY' || echo "placeholder")
            SERVICE=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY' || echo "placeholder")

            flutter test integration_test \
              --dart-define=SUPABASE_TEST_MODE=true \
              --dart-define=SUPABASE_URL=$URL \
              --dart-define=SUPABASE_ANON_KEY=$ANON \
              --dart-define=SUPABASE_SERVICE_ROLE_KEY=$SERVICE
          else
            echo "⚠️ No integration_test directory found, skipping."
          fi
        continue-on-error: true

  # ════════════════════════════════════════════════════════
  # STAGE 4: BUILD VERIFICATION (Android)
  # ════════════════════════════════════════════════════════
  build_android:
    runs-on: ubuntu-latest
    name: 🤖 Build Android
    needs: [analyze, test, test_integration_supabase]
    if: always() && needs.analyze.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔑 Create placeholder .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN || 'placeholder' }}" >> .env

      - name: 🏗️ Build Android APK (Debug — PR/branch verification)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          flutter build apk --debug --no-shrink \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: 📤 Upload Debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: 🏗️ Build Android App Bundle (Release — tagged builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          flutter build appbundle --release --no-pub \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=G_M_SPECIAL_K="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=O_R_SPECIAL_K="${{ secrets.OPENROUTER_API_KEY }}" \
            --dart-define=RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PATH: ${{ secrets.KEY_PATH }}

      - name: 📤 Upload Sentry Debug Symbols (Android)
        if: startsWith(github.ref, 'refs/tags/v')
        run: dart run sentry_dart_plugin
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: 📤 Upload App Bundle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # STAGE 5: BUILD VERIFICATION (iOS)
  # ════════════════════════════════════════════════════════
  build_ios:
    runs-on: macos-latest
    name: 🍎 Build iOS
    needs: [analyze, test, test_integration_supabase]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ Build iOS IPA (No Codesign)
        run: |
          flutter build ipa --release --no-codesign \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=G_M_SPECIAL_K="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=O_R_SPECIAL_K="${{ secrets.OPENROUTER_API_KEY }}" \
            --dart-define=RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: 📤 Upload Sentry Debug Symbols (iOS)
        run: dart run sentry_dart_plugin
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: build/ios/ipa/
          retention-days: 7

  # ════════════════════════════════════════════════════════
  # FINAL: PIPELINE SUMMARY
  # ════════════════════════════════════════════════════════
  summary:
    runs-on: ubuntu-latest
    name: ✅ Pipeline Summary
    needs: [analyze, security, test, test_integration_supabase, build_android]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🎉 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Code Analysis: ${{ needs.analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 Security Scan: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Supabase Tests: ${{ needs.test_integration_supabase.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🤖 Android Build: ${{ needs.build_android.result }}" >> $GITHUB_STEP_SUMMARY

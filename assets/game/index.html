<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 20px; background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 5px; }
        #console { height: 60vh; overflow-y: auto; padding: 10px; border: 1px solid #0f0; margin-bottom: 15px; }
        .line { margin-bottom: 5px; }
        .blinking { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        input { background: #000; color: #0f0; border: none; font-family: inherit; font-size: 16px; outline: none; width: 80%; }
        #prompt { display: flex; align-items: center; }
    </style>
</head>
<body>
    <h1>CODEMASTER ODYSSEY <span class="blinking">_</span></h1>
    <div id="console">
        <div class="line">Initiating secure uplink... SUCCESS</div>
        <div class="line">Firewall DETECTED.</div>
        <div class="line">Challenge: Type "bypass" to proceed or "abort" to exit.</div>
    </div>
    <div id="prompt">
        <span>root@verasso:~$ &nbsp;</span>
        <input type="text" id="cmd" autocomplete="off" autofocus>
    </div>

    <script>
        const input = document.getElementById('cmd');
        const cons = document.getElementById('console');

        // Mock bridge function to prevent crashes if Flutter isn't fully attached
        if(typeof window.onChallengeResult === 'undefined') {
            window.onChallengeResult = (res) => console.log("Flutter Bridge Called:", res);
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim().toLowerCase();
                this.value = '';
                
                cons.innerHTML += `<div class="line">root@verasso:~$ ${val}</div>`;
                
                if (val === 'bypass') {
                    cons.innerHTML += '<div class="line">> Firewall bypassed. Access granted.</div>';
                    cons.innerHTML += '<div class="line">> Relaying payload to native environment...</div>';
                    setTimeout(() => window.onChallengeResult(true), 1500);
                } else if (val === 'abort') {
                    cons.innerHTML += '<div class="line">> Sequence aborted. Commencing retreat.</div>';
                    setTimeout(() => window.onChallengeResult(false), 1500);
                } else {
                    cons.innerHTML += '<div class="line">> ERROR: Unrecognized command.</div>';
                }
                
                cons.scrollTop = cons.scrollHeight;
            }
        });
    </script>
</body>
</html>

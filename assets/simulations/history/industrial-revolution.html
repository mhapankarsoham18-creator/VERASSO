<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block}
.hud{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.85);padding:10px;border:2px solid #ff6f00;color:#ff6f00;z-index:10;font-size:12px;max-width:220px}
.ctrl{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;flex-wrap:wrap;justify-content:center}
.ctrl button{background:#111;color:#ff6f00;border:1px solid #ff6f00;padding:8px 14px;font-family:inherit;font-size:11px;cursor:pointer}
.ctrl button.a{background:#ff6f00;color:#000}
</style>
</head>
<body>
<div class="hud"><div>MODULE: INDUSTRIAL REVOLUTION</div><div id="info"></div></div>
<canvas id="c"></canvas>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');let W,H,t=0,sel=0;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}addEventListener('resize',resize);resize();
const inventions=[{name:'STEAM ENGINE',year:1769,by:'James Watt',impact:'Powered factories & transport'},{name:'SPINNING JENNY',year:1764,by:'James Hargreaves',impact:'Revolutionized textile industry'},{name:'POWER LOOM',year:1785,by:'Edmund Cartwright',impact:'Automated weaving'},{name:'STEAMBOAT',year:1807,by:'Robert Fulton',impact:'River & sea transport'},{name:'LOCOMOTIVE',year:1804,by:'Richard Trevithick',impact:'Rail transport revolution'},{name:'TELEGRAPH',year:1837,by:'Samuel Morse',impact:'Instant long-distance communication'},{name:'TELEPHONE',year:1876,by:'Alexander Graham Bell',impact:'Voice communication'},{name:'LIGHTBULB',year:1879,by:'Thomas Edison',impact:'Extended productive hours'}];
c.addEventListener('pointerdown',()=>{sel=(sel+1)%inventions.length});
function loop(){t+=0.02;x.fillStyle='#1a1000';x.fillRect(0,0,W,H);
for(let i=0;i<5;i++){let gx=W*0.1+i*W*0.2;x.fillStyle='#333';x.fillRect(gx,H*0.5,30,H*0.5);x.fillStyle='#555';x.fillRect(gx-5,H*0.5,40,20);
for(let j=0;j<3;j++){let sy=H*0.3-j*30+Math.sin(t+i)*5;x.beginPath();x.arc(gx+15,sy,15+j*5,0,Math.PI*2);x.fillStyle=`rgba(100,100,100,${0.3-j*0.08})`;x.fill()}}
let inv=inventions[sel];x.fillStyle='#ff6f00';x.font='bold 22px Courier New';x.textAlign='center';x.fillText(inv.name,W/2,H*0.15);
x.fillStyle='#fff';x.font='16px Courier New';x.fillText(`${inv.year} — ${inv.by}`,W/2,H*0.22);x.fillStyle='#ccc';x.font='13px Courier New';x.fillText(inv.impact,W/2,H*0.29);
x.fillStyle='#555';x.font='11px Courier New';x.fillText(`[${sel+1}/${inventions.length}] Tap for next`,W/2,H*0.95);requestAnimationFrame(loop)}loop();
</script>
</body>
</html>

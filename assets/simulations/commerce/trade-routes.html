<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block}
.hud{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.85);padding:10px;border:2px solid #8d6e63;color:#8d6e63;z-index:10;font-size:12px;max-width:220px}
.ctrl{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;flex-wrap:wrap;justify-content:center}
.ctrl button{background:#111;color:#8d6e63;border:1px solid #8d6e63;padding:8px 14px;font-family:inherit;font-size:11px;cursor:pointer}
.ctrl button.a{background:#8d6e63;color:#000}
</style>
</head>
<body>
<div class="hud"><div>MODULE: TRADE ROUTES</div><div id="info"></div></div>
<canvas id="c"></canvas>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');let W,H,t=0;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}addEventListener('resize',resize);resize();
const ports=[{name:'Shanghai',x:0.78,y:0.4},{name:'Singapore',x:0.72,y:0.58},{name:'Rotterdam',x:0.47,y:0.28},{name:'Dubai',x:0.58,y:0.45},{name:'LA',x:0.12,y:0.38},{name:'Mumbai',x:0.62,y:0.48},{name:'Santos',x:0.3,y:0.7}];
const routes=[[0,1],[1,3],[3,2],[2,4],[0,4],[3,5],[1,5],[5,2],[6,2],[6,4]];
function loop(){t+=0.005;x.fillStyle='rgba(10,10,26,0.1)';x.fillRect(0,0,W,H);
routes.forEach(([a,b],i)=>{let p1=ports[a],p2=ports[b];x.beginPath();x.moveTo(p1.x*W,p1.y*H);x.lineTo(p2.x*W,p2.y*H);x.strokeStyle='#8d6e6333';x.lineWidth=1;x.stroke();
let prog=(t*2+i*0.3)%1;let sx=p1.x*W+(p2.x*W-p1.x*W)*prog,sy=p1.y*H+(p2.y*H-p1.y*H)*prog;
x.beginPath();x.arc(sx,sy,3,0,Math.PI*2);x.fillStyle='#ff9800';x.fill()});
ports.forEach(p=>{x.beginPath();x.arc(p.x*W,p.y*H,6,0,Math.PI*2);x.fillStyle='#8d6e63';x.fill();x.strokeStyle='#fff';x.lineWidth=1;x.stroke();
x.fillStyle='#fff';x.font='10px Courier';x.textAlign='center';x.fillText(p.name,p.x*W,p.y*H-12)});
requestAnimationFrame(loop)}loop();
</script>
</body>
</html>

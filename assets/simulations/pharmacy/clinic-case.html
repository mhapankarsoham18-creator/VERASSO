<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Dose Adjuster</title>
    <style>
        :root {
            --bg: #eceff1;
            --surface: #ffffff;
            --primary: #1565C0;
            --secondary: #00838F;
            --text: #263238;
            --error: #c62828;
            --border: #cfd8dc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #546e7a;
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 16px;
            background: #f8fbff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Full width for gender */
        .full-width {
            grid-column: span 2;
        }

        .results {
            background: #e1f5fe;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }

        .big-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            margin: 10px 0;
        }

        .recommendation {
            font-size: 14px;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }
        .b-normal { background: #4CAF50; }
        .b-mild { background: #FFA000; }
        .b-severe { background: #F44336; }

    </style>
</head>
<body>

    <div class="card">
        <h2>Clinical Dose Adjuster</h2>
        <p style="text-align:center; font-size: 13px; color: #666; margin-top: -5px;">Cockcroft-Gault Equation (CrCl)</p>

        <div class="input-grid">
            
            <div class="form-group">
                <label>Age (years)</label>
                <input type="number" id="inp_age" value="65" min="18" max="120">
            </div>

            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" id="inp_weight" value="70" min="30" max="250">
            </div>

            <div class="form-group">
                <label>Serum Creatinine (mg/dL)</label>
                <input type="number" id="inp_scr" value="1.2" min="0.1" max="15.0" step="0.1">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select id="inp_gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
        </div>

        <div class="results">
            <div style="text-align:center; font-weight: bold; color: #333;">Creatinine Clearance (CrCl)</div>
            <div class="big-number" id="res_crcl">---</div>
            <div style="text-align:center;">ml/min</div>

            <hr style="border: 0; border-top: 1px solid #b3e5fc; margin: 15px 0;">

            <div class="recommendation">
                <strong><span id="badge_status" class="badge b-normal">Normal</span></strong>
                <p id="txt_recommend" style="margin: 8px 0 0 0;">Enter patient parameters to calculate renal function and recommended drug dosing factors.</p>
            </div>
        </div>
    </div>

    <script>
        const iAge = document.getElementById('inp_age');
        const iWeight = document.getElementById('inp_weight');
        const iScr = document.getElementById('inp_scr');
        const iGender = document.getElementById('inp_gender');

        const resCrcl = document.getElementById('res_crcl');
        const badgeStatus = document.getElementById('badge_status');
        const txtRecommend = document.getElementById('txt_recommend');

        function calculate() {
            const age = parseFloat(iAge.value);
            const weight = parseFloat(iWeight.value);
            const scr = parseFloat(iScr.value);
            const isFemale = iGender.value === 'female';

            if (isNaN(age) || isNaN(weight) || isNaN(scr) || scr <= 0) return;

            // Cockcroft-Gault Equation
            // CrCl = [ (140 - Age) * Weight ] / [ 72 * SCr ]  ( * 0.85 if female )
            
            let crcl = ((140 - age) * weight) / (72 * scr);
            if (isFemale) {
                crcl *= 0.85;
            }

            resCrcl.innerText = crcl.toFixed(1);

            // Staging and Recommendations
            if (crcl >= 90) {
                badgeStatus.className = 'badge b-normal';
                badgeStatus.innerText = 'Normal Function';
                txtRecommend.innerText = 'Standard dosing protocol indicated. No renal adjustments necessary for most medications.';
            } else if (crcl >= 60) {
                badgeStatus.className = 'badge b-mild';
                badgeStatus.innerText = 'Mild Impairment';
                txtRecommend.innerText = 'Monitor narrow-therapeutic index drugs. Standard dosing usually safe, but check specific drug monographs.';
            } else if (crcl >= 30) {
                badgeStatus.className = 'badge b-mild';
                badgeStatus.innerText = 'Moderate Impairment';
                txtRecommend.innerText = 'Dose adjustment required for renally cleared drugs (e.g., Gabapentin, DOACs, antibiotics). Consider 50% dose reduction or extended intervals.';
            } else if (crcl >= 15) {
                badgeStatus.className = 'badge b-severe';
                badgeStatus.innerText = 'Severe Impairment';
                txtRecommend.innerText = 'Strict dose adjustments required. Contraindicated for certain meds (e.g., Metformin, Rivaroxaban). Extended interval dosing heavily recommended.';
            } else {
                badgeStatus.className = 'badge b-severe';
                badgeStatus.innerText = 'Kidney Failure (ESRD)';
                txtRecommend.innerText = 'Dialysis protocols apply. Supplemental dosing may be required post-dialysis.';
            }
        }

        // Add listeners
        [iAge, iWeight, iScr, iGender].forEach(el => {
            el.addEventListener('input', calculate);
            el.addEventListener('change', calculate); // For select box
        });

        // Initial calc
        calculate();

    </script>
</body>
</html>

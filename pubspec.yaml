name: verasso
description: A unified social-learning ecosystem.
publish_to: "none"
version: 1.2.0+3

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ---------------- STATE MANAGEMENT ----------------
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.2
  json_annotation: ^4.11.0

  # ---------------- NAVIGATION ----------------
  go_router: ^17.1.0

  # ---------------- BACKEND ----------------
  supabase_flutter: ^2.8.1
  google_generative_ai: ^0.4.5

  # ---------------- LOGGING ----------------
  logger: ^2.6.2

  # ---------------- UI & DESIGN ----------------
  google_fonts: ^8.0.1
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  glassmorphism_ui: ^0.3.0
  shimmer: ^3.0.0
  fl_chart: ^1.1.1
  confetti: ^0.8.0
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.2.1

  # ---------------- FIREBASE ----------------
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # ---------------- INTERNAL PACKAGE ----------------
  codemaster_odyssey:
    path: packages/codemaster_odyssey

  # ---------------- UTILITIES ----------------
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.2
  uuid: ^4.5.3
  timeago: ^3.7.1
  image_picker: ^1.1.2
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  pointycastle: ^3.9.1 # keep stable with encrypt
  crypto: ^3.0.3
  bcrypt: ^1.2.0
  pinenacl: ^0.6.0
  path: ^1.9.1
  vector_math: ^2.2.0
  supabase: ^2.10.2

  # ---------------- MEDIA & MESSAGING ----------------
  file_picker: ^10.3.10
  photo_view: ^0.15.0

  # ---------------- AR & SENSORS ----------------
  permission_handler: ^12.0.1

  # ---------------- BIOMETRIC ----------------
  local_auth: ^3.0.1

  # ---------------- NETWORKING ----------------
  dio: ^5.9.1
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  network_info_plus: ^7.0.0

  # ---------------- STORAGE ----------------
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path_provider: ^2.1.2
  share_plus: ^12.0.1
  flutter_markdown_plus: ^1.0.0 # replaced discontinued package

  # ---------------- MONITORING ----------------
  image: ^4.2.0
  sentry_flutter: ^9.12.0
  flutter_jailbreak_detection: ^1.10.0

  # ---------------- ICONS ----------------
  lucide_icons: ^0.257.0
  cupertino_icons: ^1.0.8

  # ---------------- SPLASH ----------------
  flutter_native_splash: ^2.4.4
  flame: ^1.36.0

dev_dependencies:
  sentry_dart_plugin: ^3.2.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  hive_test: ^1.0.1

  # -------- CODE GENERATION --------
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpeg"

flutter_native_splash:
  color: "#000000"
  image: "assets/images/splash-icon.png"
  android_12:
    image: "assets/images/splash-icon.png"
    color: "#000000"
  fullscreen: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/docs/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: verasso

dependency_overrides:
  image: ^4.2.0
  intl: ^0.20.2
